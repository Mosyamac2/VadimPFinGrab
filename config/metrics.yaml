# Financial metrics catalogue split by issuer profile (Patch 19).
#
# Banks and corporates publish almost disjoint headline metrics; trying to
# extract revenue / EBITDA from a bank gives empty cells, and trying to
# extract net interest income from a corporate is nonsense. Each issuer in
# tickers.yaml carries a `profile: bank | non_bank` and the Metric
# Extractor picks the metric set from this file accordingly.
#
# Synonym discipline: each line is annotated with the real fixture (ticker
# + file + page) where it appears. New synonyms must be backed by a real
# document under tests/fixtures/pdf/ — "general knowledge" additions get
# rejected on review (see PLAN_e-disclosure_parser_v2.md §4 / Patch 19).
#
# `only_in_sources` opts a metric out of standards where it cannot exist
# (EBITDA in RSBU is the canonical case): the Metric Extractor strips it
# from the LLM prompt and the Validator excludes it from completeness.
# `aggregation_hint` is a free-form note injected into the LLM prompt only
# when the source is RSBU (where, e.g., total debt sits in two balance
# lines that need summing).

profiles:
  non_bank:
    metrics:
      revenue:
        synonyms:
          - Выручка                          # подтверждено: tests/fixtures/pdf/lkoh_rsbu_q1_2026.pdf стр. 4 (ОФР, строка 2110)
          - Выручка от реализации
          - Revenue
          - Net sales
        unit: RUB
        scale_hints: [млн руб., тыс. руб., млрд руб.]
      ebitda:
        synonyms:
          - EBITDA
          - Скорректированная EBITDA
          - Adjusted EBITDA
        unit: RUB
        only_in_sources: [IFRS, ISSUER]      # RSBU не публикует EBITDA напрямую
      net_income:
        synonyms:
          - Чистая прибыль                   # подтверждено: tests/fixtures/pdf/vtb_go_2024_first30.pdf стр. 11
          - Чистая прибыль (убыток)          # подтверждено: tests/fixtures/pdf/lkoh_rsbu_q1_2026.pdf стр. 4 (ОФР, строка 2400)
          - Net income
          - Прибыль за период
        unit: RUB
      total_assets:
        synonyms:
          - Итого активы                     # подтверждено: tests/fixtures/pdf/vtb_go_2024_first30.pdf стр. 122 (full report)
          - Total assets
          - Активы
        unit: RUB
      total_debt:
        synonyms:
          - Заемные средства                 # подтверждено: tests/fixtures/pdf/lkoh_rsbu_q1_2026.pdf стр. 3 (бух. баланс, строки 1410 + 1510)
          - Заёмные средства                 # тот же термин с буквой «ё», встречается в МСФО-переводах
          - Долговые обязательства
          - Total debt
          - Долгосрочные и краткосрочные кредиты и займы
        unit: RUB
        aggregation_hint: "В РСБУ это сумма строк 1410 (долгосрочные заёмные средства) + 1510 (краткосрочные заёмные средства). Если строки даны раздельно — суммируй обе."
    reporting_priority: [IFRS, RSBU, ISSUER]   # ANNUAL (type=2) — metadata-only, не источник метрик

  bank:
    metrics:
      net_interest_income:
        synonyms:
          - Чистые процентные доходы         # подтверждено: tests/fixtures/pdf/vtb_go_2024_first30.pdf стр. 11, 29 (мн.ч.)
          - Чистый процентный доход          # SBER МСФО (ед.ч.) — реальная фикстура появится в Patch 21/будущих
          - Net interest income
          - Процентный доход за вычетом процентного расхода
        unit: RUB
      net_fee_income:
        synonyms:
          - Чистые комиссионные доходы       # подтверждено: tests/fixtures/pdf/vtb_go_2024_first30.pdf стр. 11, 29 (мн.ч.)
          - Чистый комиссионный доход        # SBER МСФО (ед.ч.)
          - Net fee and commission income
          - Чистый доход от комиссионных операций
        unit: RUB
      net_income:
        synonyms:
          - Чистая прибыль                   # подтверждено: tests/fixtures/pdf/vtb_go_2024_first30.pdf стр. 11
          - Net income
          - Прибыль за период
        unit: RUB
      total_assets:
        synonyms:
          - Итого активы                     # подтверждено: tests/fixtures/pdf/vtb_go_2024_first30.pdf full report стр. 122
          - Total assets
          - Активы группы
        unit: RUB
      total_equity:
        synonyms:
          - Итого собственный капитал
          - Total equity
          - Капитал акционеров
          - Капитал, отнесенный на акционеров
        unit: RUB
    reporting_priority: [IFRS, RSBU, ISSUER]
