# MOEX Top-50 issuers scraped from e-disclosure.ru.
#
# Each entry needs:
#   ticker            — MOEX ticker (uppercase Latin)
#   name              — full legal name as it appears on e-disclosure
#   e_disclosure_id   — numeric id from the issuer's e-disclosure card URL
#                       (https://www.e-disclosure.ru/portal/company.aspx?id=N)
#   profile           — bank | non_bank (drives the metric set used by the
#                       Metric Extractor; see config/metrics.yaml)
# Optional:
#   inn / ogrn        — for downstream cross-references; not used for scraping
#   priority_override — overrides the profile's reporting_priority for this
#                       issuer (rare; useful when an issuer publishes IFRS
#                       only via a sister entity)
#
# Workflow for filling new entries (Patch 20):
#   1. Add the entry with `e_disclosure_id: REPLACE_ME`.
#   2. Run `python tools/find_e_disclosure_ids.py --tickers <TICKER>` —
#      it queries e-disclosure search and prints the top-3 candidate ids
#      ranked by name similarity. Pick the right one by hand and paste
#      it back here.
#   3. Run `python tools/validate_tickers.py [--strict]` — probes
#      type=2/3/4/5 per ticker and reports OK/EMPTY/MISSING/ERROR. A
#      ticker passes when at least one of type=3/4/5 returns OK.
#
# Known caveats:
#   - Some issuers publish only one or two of the four file types under
#     their main e_disclosure_id (canonical example: LKOH id=17 has no
#     type=4 — Lukoil's IFRS report is filed under another legal entity).
#     Such MISSING types are reported by validate_tickers.py but do not
#     fail validation; the Metric Extractor's profile.reporting_priority
#     gracefully falls back to whatever IS published.
#   - The MOEX index composition shifts over time. The list below is a
#     snapshot — operators should refresh against
#     https://www.moex.com/ru/index/IMOEX periodically.
#
# Banks in this list (profile: bank): SBER, VTBR, BSPB, TCSG, MBNK, SVCB.

