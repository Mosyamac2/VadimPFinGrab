# Application-wide configuration. Reloaded on every pipeline run.
# All file paths are relative to the project root.

paths:
  data_dir: data
  raw_dir: data/raw
  processed_dir: data/processed
  state_db: data/state.sqlite
  output_dir: output
  excel_path: output/e-disclosure.xlsx
  logs_dir: logs

schedule:
  cron_time: "04:00"
  timezone: Europe/Moscow

mode:
  backfill_years: 3
  default_run_mode: update

discoverer:
  base_url: https://www.e-disclosure.ru
  # Hard cap on outbound requests per second. e-disclosure.ru asks scrapers
  # to be polite — keep this conservative.
  requests_per_second: 1.0
  request_timeout_s: 30
  max_retries: 3
  retry_min_wait_s: 0.5
  retry_max_wait_s: 10
  # When false, robots.txt is ignored. Set to false only if you have written
  # permission from the source. The pipeline will log a WARNING on startup.
  respect_robots: true
  # If the site's anti-bot rules return 403 to the default UA, override with
  # a real browser string here. Leave null to keep the polite default.
  # user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  user_agent: null
  # Session cookies for sites behind a JavaScript anti-bot challenge
  # (ServicePipe, Cloudflare, etc.). Solve the challenge once in your
  # laptop browser, open devtools → Application → Cookies → www.e-disclosure.ru,
  # copy values into the dict below. Refresh manually when they expire.
  cookies: {}
  # Example with ServicePipe cookies:
  # cookies:
  #   spsn: "1777660057657_"
  #   spid: "1777660057657_bcd3ce8ab3fb4d44f95d6b20e4184f4e_4u1a2wa0rpuqir7k"
  # HTTP backend for the Discoverer + Downloader stages (Patch 23).
  #   httpx       — stdlib TLS, fast, fails when ServicePipe checks JA3.
  #   playwright  — launches headless Chromium once per run; reuses
  #                 Chromium's TLS-fingerprint and cookie jar so JA3
  #                 stays consistent. Requires:
  #                     pip install '.[playwright]'
  #                     playwright install chromium
  #                     playwright install-deps chromium    # Linux only
  http_backend: httpx

downloader:
  # Number of publications downloaded in parallel.
  concurrency: 4
  # If true, when source_url returns HTML, parse it for document links and
  # download referenced PDF/RAR/ZIP files into a `linked/` subdirectory.
  follow_html_links: true
  # Stream chunk size for large RAR/PDF downloads.
  chunk_size_bytes: 65536

unpacker:
  # Hard cap on the total uncompressed size of an extracted archive (MB).
  # ZIP/RAR contents that would exceed this cap fail the publication.
  max_unpacked_mb: 500

classifier:
  # Patch 18 — primary knob: a PDF page is classified as "text" when it
  # carries at least this many non-whitespace characters; below — "scan",
  # routed to OCR by the Text Extractor on a per-page basis. Banking RSBU
  # documents typically have text pages 1-4 and scanned regulator forms
  # 5-17 — the per-page split keeps the text half intact while OCR-ing
  # only the scanned half.
  min_text_chars_per_page: 50
  # Deprecated by Patch 18; kept loadable for back-compat with older
  # app.yaml files. Not consulted by the Classifier any more.
  min_text_chars: 400
  first_pages_to_inspect: 3

text_extractor:
  # Hard cap on extracted text length per document; longer outputs are
  # truncated with a warning. The LLM stage chunks separately on top of this.
  max_chars: 400000
  # Pull tables from native PDFs via pdfplumber as an extra signal for the LLM.
  extract_tables: true
  # Lines that recur on at least this many pages (case-sensitive after
  # normalisation) are stripped as headers/footers.
  header_footer_min_pages: 3
  # Patch 21 — Issuer Reports (type=5) are 50–100 pages of MD&A with KPIs
  # in section 1.4 only. The Metric Extractor trims to that section before
  # LLM dispatch; this caps the final slice so even an un-anchored
  # fallback can't blow the prompt budget.
  issuer_trim_max_chars: 30000

validator:
  # Publications below this metric-coverage ratio are flagged is_incomplete=1
  # and routed into the QA-issues report (see ТЗ §11.2).
  completeness_threshold: 0.5

orchestrator:
  # Within-stage parallelism cap (currently honoured by Downloader's semaphore).
  publication_concurrency: 4

google_drive:
  # When true and the OAuth keys in .env are present, the Replicator stage
  # uploads `output/e-disclosure.xlsx` to Google Drive after each successful
  # run. The file_id is preserved (update, not create) so the public link
  # never changes — see ТЗ §10.4.
  enabled: false
  # Drive folder ID where the mart should live (set to a folder you control).
  folder_id: null
  file_name: e-disclosure.xlsx
  # Optional dated snapshots in `archive/` subfolder for audit.
  archive: false

# Optional contact email — embedded into the User-Agent header used for
# scraping e-disclosure.ru. Leave empty if you do not want to expose it.
contact_email: null
